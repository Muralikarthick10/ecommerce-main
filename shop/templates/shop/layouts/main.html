{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="ShopKart — a modern premium online store.">
  <title>{% block title %}ShopKart{% endblock %} · ShopKart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">

  <script>
    // Apply theme before paint to avoid flash.
    (function () {
      var t = localStorage.getItem("sk-theme");
      if (!t && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) t = "dark";
      if (t) document.documentElement.setAttribute("data-theme", t);
    })();
    window.SHOPKART = {
      firebaseEnabled: {{ firebase_enabled|yesno:"true,false" }},
      firebaseConfig: {{ firebase_config_json|safe }},
      userId: {% if user.is_authenticated %}{{ user.id }}{% else %}null{% endif %},
      userName: "{{ user.username|default:'Guest'|escapejs }}"
    };
  </script>
</head>
<body>

  <div id="page-loader"><div class="loader-ring"></div></div>

  {% include 'shop/inc/navbar.html' %}

  <main>
    <div class="container py-4">
      {% include 'shop/inc/message.html' %}
    </div>
    {% block content %}{% endblock %}
  </main>

  {% include 'shop/inc/footer.html' %}
  {% include 'shop/inc/chat.html' %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="{% static 'js/app.js' %}" defer></script>
  <script type="module" src="{% static 'js/firebase-chat.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
